<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>

<title>Lugta - Live Bidding</title>
<!-- Fonts -->

<!-- Tailwind Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {

              "primary": "#0bda62",
              "primary-dark": "#09af4e",
              "background-light": "#f5f8f7",

            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
            keyframes: {
                pulseRed: {
                    '0%, 100%': { color: '#ef4444', textShadow: '0 0 10px rgba(239, 68, 68, 0.5)' },
                    '50%': { color: '#f87171', textShadow: '0 0 20px rgba(239, 68, 68, 0.8)' },

        },
      }

</span>

<span class="font-display text-2xl font-bold text-red-500 animate-pulse-red tabular-nums">00:45</span>
</div>
<!-- Price -->
<div class="text-center mt-2">
<h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight drop-shadow-sm leading-tight">

                    </h1>

</div>
</div>

<div class="flex flex-wrap items-center justify-center gap-3">

<div class="flex items-center gap-2 bg-surface-dark/80 px-3 py-1.5 rounded-lg border border-primary/20">

</div>
</div>

<div class="flex flex-col gap-3 absolute bottom-0 w-full pb-2 transition-all duration-500">
<!-- Bid Item 3 (Newest) -->

<span class="text-[10px] text-slate-400">منذ لحظات</span>
</div>
</div>
<div class="flex items-center gap-1 text-primary font-bold font-display text-sm">
<span>+</span>
<span>25,000</span>
</div>

<div class="flex items-center justify-between p-2 rounded-xl bg-surface-dark/40 border border-white/5 opacity-70 scale-95 origin-bottom">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-cover bg-center border border-white/10" data-alt="User avatar" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDa6Iv3PludKsLnd2SQWU7sfP47Mv7fDJLComoLcAxHh2EiKseR49BNXR0oe-yFLSyfSArn7QEbQgwvSWr8f-7Z8D6RiEydTeKUCqmyPq8-VcEro8zTuM8Gvmit7Il9Ffpvlqk7mMeqOPFkiTxMBZo4jF-gIqRCKxzDTuwtsbG-c5Tdpcg8zpe4A9YCUWXeXhbfF0D_HhZWhETWELWTZjcKccE14imLNSeJca6se1COTXjavyRnTZuQDlNPMvxJiYsncfn7sKKPHN4');"></div>

</div>
<div class="flex items-center gap-1 text-primary/80 font-bold font-display text-sm">

<span>10,000</span>
</div>
</div>
</div>

<div class="flex justify-center gap-3 w-full">
<button class="flex-1 py-3 px-2 rounded-full bg-surface-dark border border-white/10 hover:border-primary/50 hover:bg-surface-dark/80 active:bg-primary active:text-black active:border-primary transition-all group">
<span class="block text-center text-sm font-bold text-white group-active:text-black font-display">+ 5k</span>
</button>
<button class="flex-1 py-3 px-2 rounded-full bg-surface-dark border border-white/10 hover:border-primary/50 hover:bg-surface-dark/80 active:bg-primary active:text-black active:border-primary transition-all group">
<span class="block text-center text-sm font-bold text-white group-active:text-black font-display">+ 10k</span>
</button>
<button class="flex-1 py-3 px-2 rounded-full bg-surface-dark border border-white/10 hover:border-primary/50 hover:bg-surface-dark/80 active:bg-primary active:text-black active:border-primary transition-all group">
<span class="block text-center text-sm font-bold text-white group-active:text-black font-display">+ 25k</span>
